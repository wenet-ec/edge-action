name: "WENet Deploy"
description: "Deploy the checked-out project with the wenet CLI"
author: "WENet"

inputs:
  api-token:
    description: "WENet public API token"
    required: true
  api-server:
    description: "WENet public API server"
    required: false
    default: "https://api.wenet-ec.com"
  command:
    description: "wenet command to run: deploy (build + upload + rollout) or push (build + upload only)"
    required: false
    default: "deploy"
  cli-version:
    description: "wenet CLI version to install, e.g. v0.1.0. Use latest for the newest release."
    required: false
    default: "latest"
  cli-repository:
    description: "GitHub repository that publishes wenet CLI releases"
    required: false
    default: "wenet-ec/wenet-cli"
  working-directory:
    description: "Directory containing edge.toml"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install wenet CLI
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $repo = "${{ inputs.cli-repository }}"
        $version = "${{ inputs.cli-version }}"
        $runnerOs = "${{ runner.os }}"
        $runnerArch = "${{ runner.arch }}"

        $os = switch ($runnerOs) {
          "Linux" { "linux" }
          "macOS" { "darwin" }
          "Windows" { "windows" }
          default { throw "unsupported runner OS: $runnerOs" }
        }

        $arch = switch ($runnerArch) {
          "X64" { "amd64" }
          "ARM64" { "arm64" }
          default { throw "unsupported runner architecture: $runnerArch" }
        }

        $extension = if ($os -eq "windows") { "zip" } else { "tar.gz" }
        $asset = "wenet_${os}_${arch}.${extension}"

        if ($version -eq "latest") {
          $url = "https://github.com/${repo}/releases/latest/download/${asset}"
        } else {
          $url = "https://github.com/${repo}/releases/download/${version}/${asset}"
        }

        $installDir = Join-Path $env:RUNNER_TEMP "wenet-cli"
        $archivePath = Join-Path $env:RUNNER_TEMP $asset
        New-Item -ItemType Directory -Path $installDir -Force | Out-Null

        Write-Host "Downloading wenet CLI ${version} for ${os}/${arch}"
        Invoke-WebRequest -Uri $url -OutFile $archivePath

        if ($os -eq "windows") {
          Expand-Archive -Path $archivePath -DestinationPath $installDir -Force
        } else {
          tar -xzf $archivePath -C $installDir
          chmod +x (Join-Path $installDir "wenet")
        }

        Add-Content -Path $env:GITHUB_PATH -Value $installDir

    - name: Run wenet
      shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      env:
        API_TOKEN: ${{ inputs.api-token }}
        API_SERVER: ${{ inputs.api-server }}
      run: |
        $ErrorActionPreference = "Stop"
        $cmd = "${{ inputs.command }}"
        if ($cmd -ne "deploy" -and $cmd -ne "push") {
          throw "Invalid command '$cmd'. Must be 'deploy' or 'push'."
        }
        wenet $cmd

branding:
  icon: "upload-cloud"
  color: "blue"
